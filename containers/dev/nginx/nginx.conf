server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — the hash-based router lives entirely client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { application/wasm wasm; }
    }
}
