# codex.toml — SpecNative configuration for Codex CLI
# Generated by SpecNative installer. Edit as needed.
# Docs: spec-native/.specnative/MCP.md

[mcp_servers.specnative]
command = "./.specnative/.venv/bin/python3"
args    = ["./.specnative/specnative_mcp.py"]
type    = "stdio"

# ---------------------------------------------------------------------------
# Custom prompts — invoke with: codex --prompt spec-init
# ---------------------------------------------------------------------------

[prompts.spec-init]
description = "Initialize SpecNative — guided project setup"
prompt = """
You are helping a developer set up SpecNative for their project.

Use the specnative MCP server:
1. Call health_check() to see which spec-native/ documents are empty or missing.
2. Explain SpecNative in 1-2 lines: "Your repo is the context. No more explaining the project in every session."
3. Interview the developer with these questions (wait for each answer):
   - What problem does this project solve?
   - Who are the users? What is their main pain?
   - What is the measurable success goal?
   - What is explicitly out of scope?
   - What is the tech stack? (language, framework, database)
   - How is the system structured? (main modules)
   - Coding conventions? (naming, testing, commits)
   - Main dev/test/build commands?
4. Use refine_document() to fill:
   spec-native/PRODUCT.md, STACK.md, ARCHITECTURE.md, CONVENTIONS.md, COMMANDS.md
5. Confirm what was written and suggest: "Next step: use spec-update or start_initiative."
"""

[prompts.spec-update]
description = "Update SpecNative docs — detect gaps, refine iteratively"
prompt = """
Use the specnative MCP server:
1. Call health_check() — show the full report to the developer.
2. Call suggest_next() — show the top 3 recommended actions.
3. Ask: "What do you want to work on today?"
   a) Fill detected gaps
   b) Update a specific document (which one?)
   c) Start a new spec for an initiative
4. Based on the answer:
   a) Ask targeted questions for each gap, use refine_document() to update.
   b) Read the doc with read_context(), ask what changed, update with refine_document().
   c) Guide through start_initiative() prompt.
5. Run health_check() again to confirm improvement.
"""

[prompts.spec-status]
description = "Quick SpecNative project health check"
prompt = """
Use the specnative MCP server:
1. Call resume() — check for active work from another agent.
2. Call status() — show active specs and task counts.
3. Call health_check() — show documentation alerts.
4. Summarize in 5 lines: what's healthy, what needs attention, most urgent action.
"""

[prompts.spec-handoff]
description = "Generate structured handoff for next agent"
prompt = """
Use the specnative MCP server to generate a handoff for the next agent.
1. Call status() and resume() to see current state.
2. Ask: what are you working on? what's the next step? any unrecorded decisions?
3. Call checkpoint() with the gathered info.
4. If there are unrecorded decisions, call log_decision() for each.
5. Confirm: read_context('session') and show SESSION.md to the developer.
6. Confirm: "Handoff ready. Next agent can call resume() to continue."
"""
